<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Loci — Read, Listen &amp; Study Any Book You Own</title>
    <meta name="description" content="Upload your EPUB, listen with AI-quality narration, and study smarter with flashcards, annotations and an AI study assistant. Built for serious readers." />
    <link rel="canonical" href="https://loci.app/" />

    <!-- Theme colour (browser chrome) -->
    <meta name="theme-color" content="#F7F2E7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A0D0B" media="(prefers-color-scheme: dark)" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://loci.app/" />
    <meta property="og:title" content="Loci — Read, Listen &amp; Study Any Book You Own" />
    <meta property="og:description" content="Upload your EPUB, listen with AI-quality narration, and study smarter with flashcards, annotations and an AI study assistant." />
    <meta property="og:image" content="https://loci.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Loci" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Loci — Read, Listen &amp; Study Any Book You Own" />
    <meta name="twitter:description" content="Upload your EPUB, listen with AI-quality narration, and study smarter." />
    <meta name="twitter:image" content="https://loci.app/og-image.png" />

    <!-- Structured data (GEO / AI search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Loci",
      "url": "https://loci.app",
      "description": "Loci is a personal EPUB reader with AI-quality narration, annotations, flashcards, and an AI study assistant. Designed for serious readers studying dense material.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "GBP",
        "description": "Free tier available; Pro subscription for premium features"
      },
      "author": {
        "@type": "Organization",
        "name": "Loci",
        "url": "https://loci.app",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "hello@loci.app"
        }
      },
      "featureList": [
        "EPUB reading with customisable themes and fonts",
        "AI-quality text-to-speech narration via ElevenLabs",
        "Annotations and highlighting",
        "Flashcards with spaced repetition",
        "AI study assistant powered by Claude and Gemini",
        "Reading progress sync across devices"
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
